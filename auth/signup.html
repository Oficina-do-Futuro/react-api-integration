<!doctype html>
<html>
  <head>
    <title>Signup | Expense Tracker</title>
    <meta name="description" content="Manage your expenses with ease." />
    <link rel="stylesheet" href="/public/style.css" />
  </head>
  <body>
    <div id="title">
      <h1>Expense Tracker</h1>
      <h2>Manage Your Expense With Ease</h2>
    </div>

    <form id="signup-form">
      <div class="form-control">
        <label for="email">Email</label>
        <input id="email" />
      </div>

      <div class="form-control">
        <label for="name">Nome</label>
        <input id="name" />
      </div>

      <div class="form-control">
        <label for="surname">Apelido</label>
        <input id="surname" />
      </div>
      <div class="form-control">
        <label for="birthdate">Data de Nascimento</label>
        <input id="birthdate" type="date" />
      </div>

      <div class="form-control">
        <label for="password">Password</label>
        <input id="password" />
      </div>

      <a id="forgot-password-link" href="/auth/login.html">Já tem uma conta?</a>

      <button id="login-button"> Criar Conta </button>
    </form>
  </body>
</html>
