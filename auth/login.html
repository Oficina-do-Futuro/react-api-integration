<!doctype html>
<html>
  <head>
    <title>Login | Expense Tracker</title>
    <meta name="description" content="Manage your expenses with ease." />
    <link rel="stylesheet" href="/public/style.css" />
  </head>
  <body>
    <div id="title">
      <h1>Expense Tracker</h1>
      <h2>Manage Your Expense With Ease</h2>
    </div>

    <form id="login-form">
      <div class="form-control">
        <label for="email">Email</label>
        <input id="email" />
      </div>

      <div class="form-control">
        <label for="password">Password</label>
        <input id="password" />
      </div>

      <a id="forgot-password-link" href="/auth/forgot-password.html"
        >Esqueceu a password?</a
      >

      <button id="login-button"> Iniciar Sessão </button>

      <a id="signup-link" href="/auth/signup.html"
        >Ainda não tem uma conta? Cria agora</a
      >
    </form>
  </body>
</html>
